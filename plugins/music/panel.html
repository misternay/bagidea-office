<!doctype html>
<!--
  🎵 Music Player — panel.
  Follows the BagIdea Office plugin template: dark-theme :root vars, a single
  BASE path, routes for state/streaming/upload, and WebSocket sync so the panel
  stays live when an AGENT drives the player. The body is a flex column filling
  the panel height — only the track list scrolls, controls stay put.
-->
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🎵 Music</title>
<style>
  :root { --bg:#0c1322; --fg:#dbe7ff; --dim:#7e8db0; --accent:#5ec8ff; --card:#13203a; }
  * { box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI','Noto Sans Thai',sans-serif; }
  /* slim on-theme scrollbar (matches the office overlay) */
  html { scrollbar-width: thin; scrollbar-color: rgba(110,180,255,.3) transparent; }
  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(110,180,255,.22); border-radius: 6px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(110,180,255,.45); }
  html, body { height:100%; }
  body { background:var(--bg); color:var(--fg); padding:14px; user-select:none;
    display:flex; flex-direction:column; gap:0; overflow:hidden; }
  .top { display:flex; align-items:center; justify-content:flex-end; margin-bottom:10px; flex:0 0 auto; }
  #now { background:linear-gradient(160deg,var(--card),var(--bg)); border:1px solid rgba(255,255,255,0.08);
    border-radius:12px; padding:14px; text-align:center; margin-bottom:12px; flex:0 0 auto; }
  #disc { width:84px; height:84px; border-radius:50%; margin:0 auto 10px;
    background:radial-gradient(circle at 50% 50%,#2a3a5c 0 18%,#1a2740 19% 100%);
    border:3px solid #243250; position:relative; }
  #disc::after { content:""; position:absolute; inset:38px; border-radius:50%; background:var(--accent); }
  body.playing #disc { animation:spin 3s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  #title { font-size:13px; font-weight:600; min-height:18px; }
  #sub { font-size:10.5px; color:var(--dim); margin-top:2px; }
  .ctrls { display:flex; justify-content:center; gap:8px; margin:6px 0; flex:0 0 auto; }
  .ctrls button { width:42px; height:42px; border-radius:50%; cursor:pointer; font-size:16px;
    background:rgba(94,200,255,0.1); border:1px solid rgba(94,200,255,0.35); color:var(--fg); }
  .ctrls #pp { width:52px; height:52px; font-size:20px; }
  .ctrls button:hover { border-color:var(--accent); }
  .row { display:flex; align-items:center; gap:8px; font-size:11px; color:var(--dim); margin:8px 0; flex:0 0 auto; }
  input[type=range] { flex:1; accent-color:var(--accent); }
  .pill { padding:4px 10px; border-radius:999px; border:1px solid rgba(255,255,255,0.12);
    cursor:pointer; font-size:10.5px; color:var(--fg); background:transparent; }
  .pill:hover { border-color:var(--accent); }
  .pill.on { color:var(--accent); border-color:var(--accent); background:rgba(94,200,255,0.1); }
  #list { margin-top:6px; flex:1 1 auto; min-height:0; overflow-y:auto; }
  .trk { padding:7px 10px; border-radius:8px; font-size:11.5px;
    display:flex; gap:8px; align-items:center; }
  .trk:hover { background:rgba(94,200,255,0.07); }
  .trk.cur { background:rgba(94,200,255,0.13); color:var(--accent); }
  .trk .nm { flex:1; cursor:pointer; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .trk .del { opacity:0; cursor:pointer; color:var(--dim); padding:0 4px; }
  .trk:hover .del { opacity:1; }
  .trk .del:hover { color:#ff7070; }
  #empty { color:var(--dim); font-size:11px; text-align:center; padding:18px 8px; line-height:1.6; }
</style></head>
<body>
<div class="top">
  <button class="pill" id="add">➕ Add</button>
</div>
<div id="now">
  <div id="disc"></div>
  <div id="title">— no track —</div>
  <div id="sub"></div>
</div>
<div class="ctrls">
  <button id="prev" title="Previous">⏮</button>
  <button id="pp" title="Play / Pause">▶</button>
  <button id="next" title="Next">⏭</button>
</div>
<div class="row"><span id="cur">0:00</span><input id="seek" type="range" min="0" max="1000" value="0"><span id="dur">0:00</span></div>
<div class="row"><span>🔊</span><input id="vol" type="range" min="0" max="100"><span class="pill" id="loop">🔁 Loop</span></div>
<div id="list"></div>
<div id="empty" style="display:none">
  No tracks yet<br>Click <b>➕ Add</b> to upload <b>.mp3 / .ogg / .wav / .m4a</b>
</div>
<input id="file" type="file" accept="audio/*" multiple style="display:none">
<audio id="audio"></audio>
<script>
  const BASE = "/plugin/music";
  const A = document.getElementById("audio");
  let S = { list: [], index: 0, playing: false, volume: 60, loop: true };

  const fmt = (s) => (isNaN(s) ? "0:00" : Math.floor(s / 60) + ":" + String(Math.floor(s % 60)).padStart(2, "0"));

  async function pull() {
    try { S = await (await fetch(BASE + "/state")).json(); } catch {}
    render();
    sync();
  }
  function render() {
    document.getElementById("empty").style.display = S.list.length ? "none" : "block";
    document.getElementById("vol").value = S.volume;
    document.getElementById("loop").classList.toggle("on", S.loop);
    const cur = S.list[S.index];
    document.getElementById("title").textContent = cur ? cur.replace(/\.[^.]+$/, "") : "— no track —";
    document.getElementById("sub").textContent = S.list.length ? `${S.index + 1} / ${S.list.length}` : "";
    document.body.classList.toggle("playing", S.playing);
    document.getElementById("pp").textContent = S.playing ? "⏸" : "▶";
    const L = document.getElementById("list");
    L.innerHTML = "";
    S.list.forEach((f, i) => {
      const d = document.createElement("div");
      d.className = "trk" + (i === S.index ? " cur" : "");
      const nm = document.createElement("div");
      nm.className = "nm";
      nm.textContent = (i === S.index && S.playing ? "🎵 " : "") + f.replace(/\.[^.]+$/, "");
      nm.onclick = () => cmd("play", String(i + 1));
      const del = document.createElement("div");
      del.className = "del"; del.textContent = "🗑"; del.title = "Remove";
      del.onclick = (e) => { e.stopPropagation(); cmd("remove", String(i + 1)); };
      d.appendChild(nm); d.appendChild(del);
      L.appendChild(d);
    });
  }
  // make the actual audio element match the shared state
  function sync() {
    A.volume = (S.volume || 60) / 100;
    const want = S.list.length ? BASE + "/track?i=" + S.index : "";
    if (want && !A.src.endsWith("i=" + S.index)) A.src = want;
    if (S.playing && want) A.play().catch(() => {});
    else A.pause();
  }
  A.onended = () => cmd("next");
  A.ontimeupdate = () => {
    if (!A.duration) return;
    document.getElementById("seek").value = Math.round((A.currentTime / A.duration) * 1000);
    document.getElementById("cur").textContent = fmt(A.currentTime);
    document.getElementById("dur").textContent = fmt(A.duration);
  };
  document.getElementById("seek").oninput = (e) => {
    if (A.duration) A.currentTime = (e.target.value / 1000) * A.duration;
  };
  async function cmd(c, args) {
    try { await fetch(BASE + "/cmd", { method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ cmd: c, args: args || "" }) }); } catch {}
    pull();
  }
  document.getElementById("pp").onclick = () => cmd(S.playing ? "pause" : "play");
  document.getElementById("next").onclick = () => cmd("next");
  document.getElementById("prev").onclick = () => cmd("prev");
  document.getElementById("loop").onclick = () => cmd("loop", S.loop ? "off" : "on");
  document.getElementById("vol").oninput = (e) => { A.volume = e.target.value / 100; };
  document.getElementById("vol").onchange = (e) => cmd("volume", e.target.value);

  // ➕ add: upload picked files straight into the playlist
  document.getElementById("add").onclick = () => document.getElementById("file").click();
  document.getElementById("file").onchange = async (e) => {
    for (const f of e.target.files) {
      try {
        await fetch(BASE + "/upload?name=" + encodeURIComponent(f.name), {
          method: "POST", headers: { "content-type": "application/octet-stream" }, body: f });
      } catch {}
    }
    e.target.value = "";
    pull();
  };

  // live updates when an AGENT controls the player
  try {
    const ws = new WebSocket("ws://127.0.0.1:8787/ws");
    ws.onmessage = (m) => { try { const e = JSON.parse(m.data);
      if (!e.replay && e.type === "plugin.event" && e.plugin === "music") pull(); } catch {} };
  } catch {}
  pull();
  setInterval(pull, 4000);
</script>
</body></html>
