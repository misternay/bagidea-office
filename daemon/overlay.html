<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BagIdea Office</title>
<style>
  :root {
    --glass: rgba(14, 19, 31, 0.82);
    --line: rgba(110, 180, 255, 0.22);
    --accent: #5ec8ff;
    --text: #dce6f2;
    --dim: #8294ab;
  }
  * { box-sizing: border-box; margin: 0; }
  html { background: #0a111d; }
  body {
    font: 14px/1.45 "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(1200px 700px at 70% -10%, #14233c 0%, #0a111d 60%, #070b13 100%);
    color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    border: 1px solid rgba(110, 185, 255, 0.35); border-radius: 18px;
  }
  .px { image-rendering: pixelated; background-repeat: no-repeat; }

  /* themed scrollbars */
  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(110, 180, 255, 0.22); border-radius: 6px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(110, 180, 255, 0.45); }
  ::-webkit-scrollbar-corner { background: transparent; }

  /* round window-control buttons (custom chrome) */
  .winbtn {
    width: 26px; height: 26px; border-radius: 50%; flex: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 12px;
    color: var(--text); background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
  }
  .winbtn:hover { background: rgba(94,200,255,0.25); border-color: var(--accent); }
  .winbtn.hide:hover { background: rgba(255,84,72,0.3); border-color: #ff5448; }

  /* ---------- header ---------- */
  header {
    display: flex; align-items: center; gap: 8px; flex: none;
    padding: 8px 12px; border-bottom: 1px solid var(--line);
    background: var(--glass); backdrop-filter: blur(12px);
    font-weight: 600; font-size: 13px; letter-spacing: 1.2px;
    overflow: hidden;
  }
  header .logo { color: var(--accent); }
  #conn { width: 8px; height: 8px; border-radius: 50%; background: #ff5448; flex: none; }
  #conn.on { background: #4ade80; box-shadow: 0 0 8px #4ade8088; }
  /* Replay indicator floats as its own pill — inline in the header it used
     to shove the buttons into a wrapped, broken layout. */
  #theater {
    display: none; position: fixed; top: 44px; left: 50%;
    transform: translateX(-50%); z-index: 170;
    color: #ffb3ab; background: rgba(110, 22, 18, 0.88);
    border: 1px solid rgba(255, 90, 77, 0.8); border-radius: 14px;
    padding: 3px 14px; font-weight: 700; font-size: 11px; letter-spacing: 2px;
    animation: chipIn 0.3s ease both;
  }
  header button {
    margin-left: auto; font-size: 12px; padding: 4px 7px; cursor: pointer;
    color: var(--accent); background: rgba(255,255,255,0.05);
    border: 1px solid var(--line); border-radius: 8px; flex: none;
  }
  header button:hover { background: rgba(94,200,255,0.15); }

  /* ---------- floating menus (daylight / sessions) ----------
     position:fixed + high z-index at BODY level — menus inside the
     glass header/footer get painted under later siblings and eat no clicks. */
  #dayMenu, #sessMenu {
    display: none; position: fixed; z-index: 200;
    background: rgba(13, 19, 32, 0.97);
    border: 1px solid var(--line); border-radius: 12px; padding: 6px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.65);
  }
  #dayMenu { top: 46px; right: 12px; }
  #sessMenu { bottom: 60px; right: 12px; min-width: 250px; max-height: 290px; overflow-y: auto; }
  #dayMenu.open, #sessMenu.open { display: block; }
  #dayMenu .opt, #sessMenu .opt {
    display: flex; gap: 8px; align-items: center; cursor: pointer;
    padding: 7px 12px; border-radius: 8px; font-size: 12.5px; white-space: nowrap;
  }
  #sessMenu .opt { display: block; overflow: hidden; text-overflow: ellipsis; }
  #dayMenu .opt:hover, #sessMenu .opt:hover { background: rgba(94,200,255,0.12); }
  #dayMenu .opt.active, #sessMenu .opt.active { color: var(--accent); font-weight: 700; }
  #sessMenu .opt small { color: var(--dim); display: block; font-size: 10px; }

  /* ---------- agent rail ---------- */
  #rail {
    display: flex; gap: 8px; align-items: center; flex: none;
    padding: 8px 14px; border-bottom: 1px solid var(--line);
    background: rgba(10, 14, 24, 0.6); overflow-x: auto;
  }
  .seat {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    cursor: pointer; padding: 4px 7px 3px; border-radius: 10px;
    border: 1px solid transparent; flex: none; position: relative;
  }
  .seat:hover { background: rgba(94,200,255,0.08); }
  .seat.active { border-color: var(--accent); background: rgba(94,200,255,0.12); }
  .seat .face {
    width: 36px; height: 36px; border-radius: 9px;
    background-color: #1c2740; outline: 1px solid rgba(255,255,255,0.12);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 15px; color: #fff;
  }
  .seat .nm { font-size: 10px; color: var(--dim); max-width: 52px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .seat.active .nm { color: var(--accent); }
  .seat .dot {
    position: absolute; top: 3px; right: 5px; width: 8px; height: 8px;
    border-radius: 50%; background: #4ade80; outline: 2px solid #0a0f1a;
  }
  /* the CEO seat is YOU — first in line, golden, crowned */
  .seat.ceoSeat { border-color: rgba(255, 200, 80, 0.55); background: rgba(255, 200, 80, 0.08); }
  .seat.ceoSeat .face { outline: 2px solid #ffc850; box-shadow: 0 0 10px rgba(255, 200, 80, 0.35); }
  .seat.ceoSeat .nm { color: #ffd28a; font-weight: 700; }
  /* the Director (main) leads the AI staff — bright blue + a lead star */
  .seat.leadSeat { border-color: rgba(90, 200, 255, 0.5); background: rgba(90, 200, 255, 0.07); }
  .seat.leadSeat .face { outline: 2px solid #5ec8ff; box-shadow: 0 0 10px rgba(94, 200, 255, 0.35); }
  .seat.leadSeat .nm { color: #9fdcff; font-weight: 700; }
  .seat .crown { position: absolute; top: -6px; left: 1px; font-size: 12px; text-shadow: 0 1px 3px #000; }
  .chk { display: inline-flex; align-items: center; gap: 6px; }
  .chk .mini { width: 18px; height: 18px; border-radius: 5px; background-color: #1c2740; flex: none; }

  /* ---------- main ---------- */
  main { flex: 1; display: flex; min-height: 0; }
  #chatwrap { flex: 1; display: flex; min-width: 0; position: relative; }
  /* visual-novel companion: who you are talking to */
  #companion {
    flex: none; width: 132px; display: flex; flex-direction: column;
    align-items: center; justify-content: flex-end; padding: 0 0 6px;
    background: linear-gradient(180deg, transparent 30%, rgba(94,200,255,0.06));
    border-right: 1px solid rgba(255,255,255,0.05);
  }
  #companion .body {
    width: 96px; height: 162px;
    /* idle cycle: 4 frames, 64px cell stride at 3x = 192px per step */
    animation: compIdle 1.1s steps(4) infinite;
  }
  @keyframes compIdle {
    from { background-position-x: -48px; }
    to { background-position-x: -816px; }
  }
  #companion .tag {
    text-align: center; line-height: 1.2; padding: 4px 10px; margin-top: 2px;
    background: var(--glass); border: 1px solid var(--line); border-radius: 9px;
  }
  #companion .tag b { font-size: 13px; }
  #companion .tag span { font-size: 10px; color: var(--dim); display: block; }

  #log { flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 9px; }
  .msg { max-width: 82%; padding: 8px 12px; border-radius: 12px; white-space: pre-wrap; word-wrap: break-word; }
  .msg.you { align-self: flex-end; background: rgba(94,200,255,0.13); border: 1px solid var(--line); border-bottom-right-radius: 4px; }
  .msg.agent { align-self: flex-start; background: var(--glass); border: 1px solid rgba(255,255,255,0.07); border-bottom-left-radius: 4px; }
  .msg .who { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--accent); margin-bottom: 4px; font-weight: 600; }
  .msg .who .face { width: 20px; height: 20px; border-radius: 5px; background-color: #1c2740; }
  .chip {
    align-self: flex-start; font-size: 11.5px; color: var(--dim);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 3px 10px;
    background: rgba(255,255,255,0.03);
    animation: chipIn 0.3s ease both;
  }
  .chip b { color: #ffd28a; font-weight: 600; }
  .toolrow {
    align-self: flex-start; font-size: 10px; color: rgba(150,165,195,0.65);
    padding: 0 0 0 30px; animation: chipIn 0.25s ease both;
  }

  /* ---- micro-animations: the UI breathes -------------------------------- */
  @keyframes msgIn { from { opacity: 0; transform: translateY(9px) scale(0.985); } }
  @keyframes chipIn { from { opacity: 0; transform: translateY(6px); } }
  @keyframes popIn { from { opacity: 0; transform: scale(0.92); } }
  @keyframes badgePop { from { transform: scale(0); } 70% { transform: scale(1.35); } }
  .msg { animation: msgIn 0.26s cubic-bezier(.3,1,.5,1) both; }
  .seat { transition: transform 0.16s ease, filter 0.16s ease; }
  .seat:hover { transform: translateY(-3px); filter: brightness(1.18); }
  .seat.active { transform: translateY(-2px); }
  header button, footer button { transition: transform 0.14s ease, filter 0.14s ease; }
  header button:hover, footer button:hover { transform: translateY(-1.5px); filter: brightness(1.25); }
  header button:active, footer button:active { transform: scale(0.92); }
  .perm { animation: popIn 0.34s cubic-bezier(.2,1.4,.4,1) both; }
  #activity .act { animation: chipIn 0.25s ease both; }
  .mission { animation: chipIn 0.25s ease both; }
  #permBadge.on { animation: badgePop 0.45s cubic-bezier(.2,1.6,.4,1) both; }
  .dot { transition: background 0.5s ease; }
  #threadBar { transition: opacity 0.3s; }

  /* The sidebar is a slide-over panel everywhere: it covers the chat
     instead of resizing it, and animates in/out. */
  aside {
    position: fixed; top: 44px; right: 0; bottom: 0; z-index: 150;
    width: 250px; border-left: 1px solid var(--line); background: var(--glass);
    backdrop-filter: blur(14px); padding: 12px; overflow-y: auto;
    box-shadow: -16px 0 36px rgba(0,0,0,0.5);
    transition: transform 0.28s cubic-bezier(.3,1,.4,1), opacity 0.28s ease;
  }
  aside.closed { transform: translateX(108%); opacity: 0; pointer-events: none; }
  #sideBtn { position: relative; }
  /* Big friendly edge handle — one obvious place to open/close the panel. */
  #sideTab {
    position: fixed; top: 50%; right: 0; transform: translateY(-50%);
    z-index: 160; width: 24px; padding: 10px 2px; text-align: center;
    background: rgba(20,30,52,0.92); border: 1px solid var(--line); border-right: none;
    border-radius: 10px 0 0 10px; cursor: pointer; user-select: none;
    font-size: 13px; line-height: 1.5; color: #cfe3ff;
    transition: right 0.28s cubic-bezier(.3,1,.4,1), background 0.2s;
    box-shadow: -6px 0 18px rgba(0,0,0,0.35);
  }
  #sideTab:hover { background: rgba(40,60,100,0.95); }
  #sideTab.alert { animation: tabPulse 1.1s ease infinite; border-color: #ffb054; }
  @keyframes tabPulse {
    0%, 100% { background: rgba(20,30,52,0.92); }
    50% { background: rgba(255,150,60,0.45); }
  }
  #permBadge {
    display: none; position: absolute; top: -6px; right: -6px;
    min-width: 16px; height: 16px; line-height: 16px; border-radius: 9px;
    background: #ff5448; color: #fff; font-size: 10px; font-weight: 700;
    text-align: center; padding: 0 3px;
  }
  #permBadge.on { display: block; }
  aside h2 { font-size: 10.5px; letter-spacing: 2px; color: var(--dim); margin: 4px 0 8px; }
  .mission {
    border: 1px solid var(--line); border-left: 3px solid var(--accent);
    border-radius: 8px; padding: 7px 9px; margin-bottom: 7px; font-size: 12px;
    background: rgba(255,255,255,0.03);
  }
  .mission .id { color: var(--dim); font-size: 10.5px; }
  #activity .act {
    font-size: 11px; color: var(--dim); padding: 2.5px 2px;
    border-bottom: 1px dashed rgba(255,255,255,0.05); line-height: 1.45;
  }
  #activity .act b { color: #cfe3ff; font-weight: 600; }
  #activity .act .t { color: rgba(160,170,190,0.55); font-size: 10px; margin-right: 5px; }

  /* ---- 📡 feed mode: a pure overlay — no chrome, no buttons, no input ---- */
  #feed, #feedHead { display: none; }
  body.feedmode main, body.feedmode footer, body.feedmode #rail,
  body.feedmode #threadBar, body.feedmode #sideTab,
  body.feedmode header { display: none !important; }
  body.feedmode { background: rgba(4, 7, 13, 0.92); }
  body.feedmode #feedHead {
    display: flex; align-items: center; gap: 7px;
    position: fixed; top: 0; left: 0; right: 0; height: 30px; padding: 0 12px;
    font-size: 10.5px; letter-spacing: 2px; color: #9fb6d8; font-weight: 700;
    background: rgba(16, 24, 42, 0.85); border-bottom: 1px solid var(--line);
  }
  #feedConn { width: 7px; height: 7px; border-radius: 50%; background: #4ade80;
    box-shadow: 0 0 7px #4ade8088; margin-left: auto; }
  body.feedmode #feed {
    display: flex; flex-direction: column; gap: 5px;
    position: fixed; top: 34px; bottom: 6px; left: 6px; right: 6px;
    overflow-y: hidden; padding: 2px;
    justify-content: flex-end;  /* newest at the bottom, like stream chat */
    mask-image: linear-gradient(to bottom, transparent, black 12%);
  }
  #feedEmpty {
    color: rgba(140, 158, 188, 0.55); font-size: 11px; text-align: center;
    padding: 10px 0;
  }
  .fitem {
    display: flex; gap: 8px; align-items: flex-start; flex: none;
    background: rgba(255,255,255,0.045); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px; padding: 6px 9px; font-size: 11.5px; line-height: 1.45;
    animation: msgIn 0.25s ease both;
  }
  .fitem .face { width: 26px; height: 26px; border-radius: 7px; flex: none;
    background: #1c2740; }
  .fitem .ftxt { min-width: 0; }
  .fitem .ftxt b { display: block; font-size: 11px; color: #cfe3ff; }
  .fitem .ftxt .sess { color: var(--dim); font-weight: 400; font-size: 9.5px; }
  .fitem .ftxt .body { color: rgba(225,232,245,0.92); word-break: break-word; }
  .fitem.alert { border-color: rgba(255,176,84,0.8); background: rgba(255,150,60,0.13); }
  .fitem.ghostly { border-color: rgba(140,160,255,0.4); }
  .mission.running { border-left-color: #5ec8ff; }
  .mission.blocked { border-left-color: #ffb054; }
  .mission.done { border-left-color: #4ade80; opacity: 0.7; }
  .mission.failed { border-left-color: #ff5448; }
  .perm {
    border: 1px solid #ffb054aa; border-radius: 10px; padding: 9px;
    margin-bottom: 9px; background: rgba(255,176,84,0.08); font-size: 12px;
  }
  .perm .tool { color: #ffd28a; font-weight: 700; }
  .perm pre { font-size: 10.5px; color: var(--dim); white-space: pre-wrap; word-break: break-all; margin: 5px 0; max-height: 84px; overflow-y: auto; }
  .perm .row { display: flex; gap: 6px; }
  .perm button { flex: 1; padding: 5px; font-size: 12px; cursor: pointer; border-radius: 7px; border: 1px solid var(--line); background: rgba(255,255,255,0.05); }
  .perm .allow { color: #4ade80; border-color: #4ade8055; }
  .perm .deny { color: #ff5448; border-color: #ff544855; }

  footer {
    display: flex; gap: 8px; padding: 10px 14px; flex: none; align-items: center;
    border-top: 1px solid var(--line); background: var(--glass); backdrop-filter: blur(12px);
  }
  footer input {
    flex: 1; font: inherit; color: var(--text); background: rgba(255,255,255,0.05);
    border: 1px solid var(--line); border-radius: 10px; padding: 9px 12px; outline: none;
  }
  footer input:focus { border-color: var(--accent); }
  footer .send {
    font-size: 16px; padding: 7px 14px; cursor: pointer; color: var(--accent);
    background: rgba(94,200,255,0.1); border: 1px solid var(--line); border-radius: 10px;
  }
  footer .send:hover { background: rgba(94,200,255,0.2); }
  /* current thread indicator */
  #threadBar {
    display: flex; align-items: center; gap: 6px; flex: none;
    padding: 3px 14px; font-size: 10.5px; color: var(--dim);
    background: rgba(10, 14, 24, 0.5); border-top: 1px solid rgba(255,255,255,0.05);
  }
  #threadBar b { color: var(--accent); font-weight: 600; max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ---------- settings / editor / ID-card modal ---------- */
  #modal {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(5, 8, 14, 0.72); backdrop-filter: blur(3px);
    align-items: center; justify-content: center; border-radius: 18px;
  }
  #modal.open { display: flex; animation: chipIn 0.2s ease both; }
  #modal.open #modalCard { animation: popIn 0.3s cubic-bezier(.2,1.3,.4,1) both; }
  #modalCard {
    width: min(470px, 92vw); max-height: 86vh; overflow-y: auto;
    background: linear-gradient(160deg, #15203a 0%, #0c1322 70%);
    border: 1px solid var(--line); border-radius: 16px; padding: 16px;
    box-shadow: 0 18px 60px rgba(0,0,0,0.6);
  }
  #modalCard h3 { font-size: 13px; letter-spacing: 2px; color: var(--accent); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  #modalCard h3 .x { margin-left: auto; }
  .tabs { display: flex; gap: 6px; margin-bottom: 12px; }
  .tabs .tab {
    font-size: 11.5px; padding: 5px 12px; border-radius: 8px; cursor: pointer;
    border: 1px solid var(--line); color: var(--dim); background: rgba(255,255,255,0.03);
  }
  .tabs .tab.on { color: var(--accent); border-color: var(--accent); background: rgba(94,200,255,0.1); }
  .arow {
    display: flex; gap: 10px; align-items: center; padding: 7px 9px;
    border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; margin-bottom: 7px;
    cursor: pointer; background: rgba(255,255,255,0.025);
  }
  .arow:hover { border-color: var(--line); background: rgba(94,200,255,0.06); }
  .arow .face { width: 34px; height: 34px; border-radius: 8px; background-color: #1c2740; flex: none; }
  .arow .meta { min-width: 0; flex: 1; }
  .arow .meta b { font-size: 13px; display: block; }
  .arow .meta span { font-size: 11px; color: var(--dim); }
  .arow .lock { font-size: 12px; color: var(--dim); }
  .bigbtn {
    width: 100%; padding: 9px; margin-top: 4px; font-size: 12.5px; cursor: pointer;
    color: var(--accent); background: rgba(94,200,255,0.08);
    border: 1px dashed var(--line); border-radius: 10px;
  }
  .bigbtn:hover { background: rgba(94,200,255,0.16); }
  /* editor */
  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: 10.5px; letter-spacing: 1.5px; color: var(--dim); margin-bottom: 4px; }
  .field input, .field textarea, .field select {
    width: 100%; font: inherit; font-size: 13px; color: var(--text);
    background: rgba(255,255,255,0.05); border: 1px solid var(--line);
    border-radius: 9px; padding: 8px 10px; outline: none;
  }
  .field textarea { min-height: 110px; resize: vertical; }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }
  .field select option { background: #131c30; }
  #avGrid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 7px; }
  #avGrid .av {
    aspect-ratio: 1; border-radius: 10px; cursor: pointer; background-color: #1c2740;
    outline: 2px solid transparent; outline-offset: -2px;
  }
  #avGrid .av.sel { outline-color: var(--accent); box-shadow: 0 0 12px rgba(94,200,255,0.4); }
  .btnrow { display: flex; gap: 8px; margin-top: 14px; }
  .btnrow button {
    flex: 1; padding: 9px; font-size: 12.5px; cursor: pointer; border-radius: 9px;
    border: 1px solid var(--line); background: rgba(255,255,255,0.05); color: var(--text);
  }
  .btnrow .primary { color: #06121f; background: var(--accent); border-color: var(--accent); font-weight: 700; }
  .btnrow .danger { color: #ff7468; border-color: rgba(255,84,72,0.45); }
  .btnrow button:disabled { opacity: 0.45; cursor: wait; }
  .assistrow { display: flex; gap: 6px; }
  .assistrow input { flex: 1; }
  .assistrow .sparkle {
    flex: none; padding: 0 12px; font-size: 13px; cursor: pointer; border-radius: 9px;
    color: #ffd28a; background: rgba(255,210,138,0.08); border: 1px solid rgba(255,210,138,0.35);
  }
  .assistrow .sparkle:disabled { opacity: 0.5; cursor: wait; }
  .checks { display: flex; flex-wrap: wrap; gap: 6px; }
  .chk {
    font-size: 11.5px; padding: 4px 11px; border-radius: 16px; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.12); color: var(--dim); user-select: none;
  }
  .chk.on { color: var(--accent); border-color: var(--accent); background: rgba(94,200,255,0.1); }
  .autobadge { font-size: 9.5px; color: #ffd28a; border: 1px solid rgba(255,210,138,0.4); border-radius: 10px; padding: 1px 7px; margin-left: 6px; }
  .switch { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--dim); margin-bottom: 10px; cursor: pointer; }
  .switch .knob { width: 34px; height: 18px; border-radius: 12px; background: rgba(255,255,255,0.12); position: relative; transition: background 0.15s; }
  .switch .knob::after { content: ""; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; border-radius: 50%; background: #8294ab; transition: left 0.15s, background 0.15s; }
  .switch.on .knob { background: rgba(94,200,255,0.4); }
  .switch.on .knob::after { left: 18px; background: var(--accent); }
  /* top-down map */
  #mapWrap { position: relative; width: 100%; border-radius: 12px; overflow: hidden; border: 1px solid var(--line); }
  #mapWrap img { width: 100%; display: block; filter: saturate(1.15); }
  .mapicon {
    position: absolute; width: 26px; height: 26px; border-radius: 8px;
    transform: translate(-50%, -50%); cursor: pointer; background-color: #1c2740;
    outline: 2px solid #4ade80; box-shadow: 0 3px 10px rgba(0,0,0,0.6); z-index: 2;
  }
  .mapicon:hover { z-index: 3; outline-width: 3px; }
  .mapicon .tag {
    position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
    font-size: 9px; font-weight: 700; color: #fff; white-space: nowrap;
    background: rgba(5, 9, 16, 0.8); padding: 1px 6px; border-radius: 6px; margin-top: 2px;
  }
  /* ID card */
  #idcard { text-align: center; }
  #idcard .portrait {
    width: 108px; height: 108px; margin: 6px auto 10px; border-radius: 18px;
    background-color: #1c2740; outline: 1px solid var(--line);
    box-shadow: 0 8px 24px rgba(0,0,0,0.45);
  }
  #idcard h4 { font-size: 17px; }
  #idcard .role { color: var(--accent); font-size: 12px; letter-spacing: 1.5px; margin-bottom: 2px; }
  #idcard .uid { color: var(--dim); font-size: 10.5px; margin-bottom: 10px; }
  #idcard .state { display: inline-block; font-size: 11px; padding: 3px 12px; border-radius: 20px; border: 1px solid var(--line); margin-bottom: 12px; }
  #idcard .promptbox {
    text-align: left; font-size: 12px; color: var(--dim); white-space: pre-wrap;
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px; padding: 10px; max-height: 150px; overflow-y: auto;
  }

  /* ---------- MINI MODE: shrink the window → compact chat HUD ----------
     Secondary header buttons hide so ◱ (restore) and — never fall off. */
  @media (max-width: 480px), (max-height: 460px) {
    #companion { display: none; }
    aside { top: 34px; width: min(250px, 82vw); }
    #rail { padding: 5px 10px; }
    .seat .nm { display: none; }
    .seat .face { width: 30px; height: 30px; }
    header { padding: 6px 10px; font-size: 11px; }
    header .sub { display: none; }
    #replayBtn, #discussBtn, #mapBtn, #dayBtn, #setBtn { display: none; }
    #miniBtn { margin-left: auto; }
    #threadBar { display: none; }
    #log { padding: 10px; }
    footer { padding: 8px 10px; }
  }
</style>

<header id="titlebar" style="cursor:grab">
  <img src="/brand/logo_ico_cute.png" width="20" height="20" draggable="false" style="flex:none">
  <span class="logo">BAGIDEA</span> OFFICE
  <span id="conn"></span>
  <span id="theater">⏪ REPLAY</span>
  <button id="replayBtn" title="Replay — re-enact the last 15 minutes in the office">⏪</button>
  <button id="discussBtn" title="Let agents discuss together" style="margin-left:6px">🗣</button>
  <button id="mapBtn" title="Top-down office map" style="margin-left:6px">🗺</button>
  <button id="dayBtn" title="World atmosphere" style="margin-left:6px">🌗</button>
  <button id="setBtn" title="Office settings — agents, roles" style="margin-left:6px">⚙</button>
  <button id="sideBtn" title="Security Center & Mission Control" style="margin-left:6px">🛡<span id="permBadge"></span></button>
  <div class="winbtn" id="miniBtn" title="Mini window" style="margin-left:6px">◱</div>
  <div class="winbtn hide" id="hideBtn" title="Hide (chat head brings it back)">—</div>
</header>

<div id="rail"></div>

<main>
  <div id="chatwrap">
    <div id="companion">
      <div class="body px" id="compBody"></div>
      <div class="tag"><b id="compName">Main</b><span id="compRole">Director</span></div>
    </div>
    <div id="log"></div>
  </div>
  <aside id="side" class="closed">
    <h2>🛡 SECURITY CENTER</h2>
    <div id="perms"></div>
    <h2>🛰 MISSION CONTROL</h2>
    <div id="missions"></div>
    <h2>📜 OFFICE LOG</h2>
    <div id="activity"></div>
  </aside>
  <div id="sideTab" title="Security / Mission / Office Log">🛡<br>◀</div>
</main>

<!-- 📡 Streamer feed mode: a quiet right-edge stream of who's doing what.
     Toggled by right-clicking the chat head (the shell flips the window). -->
<div id="feedHead">
  <img src="\brand\logo_ico_cute.png" width="16" height="16" draggable="false">
  <span>📡 OFFICE FEED</span><span id="feedConn"></span>
</div>
<div id="feed">
  <div id="feedEmpty">— เงียบสงบ… รอความเคลื่อนไหวในออฟฟิศ —</div>
</div>

<div id="threadBar">🧵 thread: <b id="threadName">ล่าสุด (ต่อเนื่องอัตโนมัติ)</b></div>
<footer>
  <input id="inp" placeholder="Message Main… (Enter to send)" autofocus>
  <button class="send" id="sessBtn" title="Chat sessions (threads)">🧵</button>
  <button class="send" id="send">➤</button>
</footer>

<div id="dayMenu"></div>
<div id="sessMenu"></div>
<div id="modal"><div id="modalCard"></div></div>

<script>
  // dev error beacon → daemon log
  window.onerror = (m, s, l, c) =>
    fetch("/event", { method: "POST", headers: { "content-type": "application/json" },
      body: JSON.stringify({ type: "ui.error", agent: "overlay", text: `${m} @${l}:${c}` }) });

  // ---- portable identity (must match agent_manager.gd) -------------------
  function phash(id) {
    let h = 0;
    for (const b of new TextEncoder().encode(id)) h = (h * 31 + b) % 1000003;
    return h;
  }
  const ROLES = ["Researcher", "Engineer", "Designer", "Analyst", "Operator", "Specialist"];
  const NPCS = [1, 2, 3, 4, 5, 6, 9, 10, 11, 12];
  // Live registry from the daemon (roster.sync) — identity source of truth.
  let ROSTER = {}, REGROLES = [], REGSKILLS = {}, REGTOOLS = [], AUTOSKILLS = true;
  let BUILTIN_DESC = {}, REGMCP = {}, SOUND = true;
  function npcOf(id) {
    if (ROSTER[id] && ROSTER[id].avatar) return ROSTER[id].avatar;
    if (id === "main") return 7;
    if (id === "ceo") return 8;
    return NPCS[phash(id) % 10];
  }
  function roleOf(id) {
    if (ROSTER[id] && ROSTER[id].role) return ROSTER[id].role;
    if (id === "main") return "Director";
    if (id === "ceo") return "Chairman";
    return ROLES[phash(id) % 6];
  }
  function nameOf(id) {
    return (ROSTER[id] && ROSTER[id].name) || id[0].toUpperCase() + id.slice(1);
  }
  // CSS sprite crops from the 256x512 sheet (cell 64): face (14,14,36,36)
  // keeps the face centered with chin + shoulders; standing body (16,6,32,54).
  function face(el, id, size) {
    const k = size / 36;
    el.style.backgroundImage = `url(/char/npc${npcOf(id)}.png)`;
    el.style.backgroundSize = `${256 * k}px ${512 * k}px`;
    el.style.backgroundPosition = `${-14 * k}px ${-14 * k}px`;
    el.classList.add("px");
    el.textContent = "";
  }
  function body(el, id) {
    const k = 3;
    el.style.backgroundImage = `url(/char/npc${npcOf(id)}.png)`;
    el.style.backgroundSize = `${256 * k}px ${512 * k}px`;
    // x is driven by the compIdle keyframes (4-frame idle cycle)
    el.style.backgroundPositionY = `${-6 * k}px`;
  }

  // ---- state --------------------------------------------------------------
  const log = document.getElementById("log");
  const missionsEl = document.getElementById("missions");
  const permsEl = document.getElementById("perms");
  const railEl = document.getElementById("rail");
  const missions = {};
  const agents = {};   // id -> {state}
  let target = "main";

  function ensureAgent(id, state) {
    if (!agents[id]) {
      agents[id] = { state: state || "idle" };
      renderRail();
    } else if (state) {
      agents[id].state = state;
      renderRail();
    }
  }

  const DOTS = { idle: "#4ade80", working: "#5ec8ff", blocked: "#ffb054", offline: "#6b7280", meeting: "#c084fc" };
  function renderRail() {
    railEl.innerHTML = "";
    // The CEO (you) always leads, then the Director, then the team.
    const ids = Object.keys(agents).sort((a, b) => {
      const w = (x) => (x === "ceo" ? 0 : x === "main" ? 1 : 2);
      return w(a) - w(b) || a.localeCompare(b);
    });
    for (const id of ids) {
      const seat = document.createElement("div");
      seat.className = "seat" + (id === target ? " active" : "")
        + (id === "ceo" ? " ceoSeat" : "") + (id === "main" ? " leadSeat" : "");
      const f = document.createElement("div");
      f.className = "face";
      f.textContent = id[0].toUpperCase();
      face(f, id, 36);
      const nm = document.createElement("div");
      nm.className = "nm"; nm.textContent = id === "ceo" ? nameOf(id) + " 〔คุณ〕" : nameOf(id);
      const dot = document.createElement("div");
      dot.className = "dot";
      dot.style.background = DOTS[agents[id].state] || "#4ade80";
      seat.append(f, nm, dot);
      if (id === "ceo" || id === "main") {
        const cr = document.createElement("div");
        cr.className = "crown"; cr.textContent = id === "ceo" ? "👑" : "⭐";
        seat.appendChild(cr);
      }
      seat.onclick = () => setTarget(id);
      seat.ondblclick = () => openCard(id);   // ID card: who is this?
      seat.title = id === "ceo"
        ? `${nameOf(id)} — นี่คือคุณเอง สั่งงานที่นี่แล้ว Director จะมารับคำสั่ง`
        : `${nameOf(id)} — ${roleOf(id)} (double-click: ID card)`;
      railEl.appendChild(seat);
    }
    const plus = document.createElement("div");
    plus.className = "seat";
    plus.innerHTML = `<div class="face">＋</div><div class="nm">hire</div>`;
    plus.onclick = () => openEditor(null);
    railEl.appendChild(plus);
  }

  function setTarget(id) {
    groupView = null;  // leaving a meeting log view
    target = id;
    document.getElementById("compName").textContent = nameOf(id);
    document.getElementById("compRole").textContent = roleOf(id);
    body(document.getElementById("compBody"), id);
    document.getElementById("inp").placeholder = id === "ceo"
      ? `สั่งงานในนาม CEO… (Director จะมารับคำสั่ง)`
      : `Message ${nameOf(id)}… (Enter to send)`;
    renderRail();
    refreshThreadBar(true);  // clicking a seat always shows that agent's latest thread
  }

  // ---- chat ---------------------------------------------------------------
  function addMsg(cls, who, text) {
    const d = document.createElement("div");
    d.className = "msg " + cls;
    if (who) {
      const w = document.createElement("div");
      w.className = "who";
      const f = document.createElement("div");
      f.className = "face";
      face(f, who, 20);
      w.append(f, document.createTextNode(who.toUpperCase()));
      d.appendChild(w);
    }
    d.appendChild(document.createTextNode(text));
    log.appendChild(d);
    log.scrollTop = log.scrollHeight;
  }
  function addChip(html) {
    const d = document.createElement("div");
    d.className = "chip"; d.innerHTML = html;
    log.appendChild(d);
    log.scrollTop = log.scrollHeight;
  }
  // Tiny inline tool-call marker inside a conversation.
  function addToolRow(name) {
    const d = document.createElement("div");
    d.className = "toolrow";
    d.textContent = "⚙ " + name;
    log.appendChild(d);
    log.scrollTop = log.scrollHeight;
  }

  // Office activity (tool calls, hand-overs, ghost trips…) belongs to the
  // 📜 OFFICE LOG in the sidebar — the chat pane stays pure conversation.
  function addLog(html) {
    const box = document.getElementById("activity");
    const d = document.createElement("div");
    d.className = "act";
    const t = new Date();
    const hh = String(t.getHours()).padStart(2, "0");
    const mm = String(t.getMinutes()).padStart(2, "0");
    d.innerHTML = `<span class="t">${hh}:${mm}</span>${html}`;
    box.prepend(d);
    while (box.children.length > 40) box.removeChild(box.lastChild);
  }

  function renderMissions() {
    missionsEl.innerHTML = "";
    for (const [id, m] of Object.entries(missions)) {
      const d = document.createElement("div");
      d.className = "mission " + m.state;
      d.innerHTML = `<b>${m.agent}</b> · ${m.state}` +
        (m.tool ? ` · <i>${m.tool}</i>` : "") + `<div class="id">${id}</div>`;
      missionsEl.appendChild(d);
    }
  }

  // ---- slide-over sidebar (covers the chat; perms summon it) -------------
  const sideEl = document.getElementById("side");
  const sideTab = document.getElementById("sideTab");
  function setSide(open) {
    sideEl.classList.toggle("closed", !open);
    sideTab.innerHTML = open ? "▶" : "🛡<br>◀";
    sideTab.style.right = open ? "250px" : "0";
    try { localStorage.setItem("sideOpen", open ? "1" : "0"); } catch {}
  }
  if ((() => { try { return localStorage.getItem("sideOpen") === "1"; } catch { return false; } })())
    setSide(true);
  document.getElementById("sideBtn").onclick = () =>
    setSide(sideEl.classList.contains("closed"));
  sideTab.onclick = () => setSide(sideEl.classList.contains("closed"));
  function renderBadge() {
    const n = permsEl.children.length;
    const b = document.getElementById("permBadge");
    b.textContent = n;
    b.classList.toggle("on", n > 0);
    sideTab.classList.toggle("alert", n > 0);
  }

  // Native context menu has no business in our chrome.
  document.addEventListener("contextmenu", (e) => e.preventDefault());

  // ---- 📡 feed mode (streamer overlay) ------------------------------------
  const feedEl = document.getElementById("feed");
  window.setFeedMode = (on) => {
    document.body.classList.toggle("feedmode", on);
    if (on) feedEl.scrollTop = feedEl.scrollHeight;
  };
  function addFeed(id, text, session, kind = "") {
    const d = document.createElement("div");
    d.className = "fitem" + (kind ? " " + kind : "");
    const f = document.createElement("div");
    f.className = "face px";
    face(f, String(id).split("#")[0], 26);
    const t = document.createElement("div");
    t.className = "ftxt";
    const b = document.createElement("b");
    b.textContent = nameOf(String(id).split("#")[0]) +
      (String(id).includes("#") ? " 👻" : "");
    if (session) {
      const s = document.createElement("span");
      s.className = "sess";
      s.textContent = "  · " + session;
      b.appendChild(s);
    }
    const body = document.createElement("div");
    body.className = "body";
    body.textContent = String(text).slice(0, 220);
    t.append(b, body);
    d.append(f, t);
    const empty = document.getElementById("feedEmpty");
    if (empty) empty.remove();
    feedEl.appendChild(d);
    while (feedEl.children.length > 60) feedEl.removeChild(feedEl.firstChild);
    feedEl.scrollTop = feedEl.scrollHeight;
  }
  // One mirror for everything worth glancing at while streaming/debugging.
  function feedRoute(ev) {
    if (ev.replay || ev.theater) return;
    const sess = ev.session || "";
    if (ev.type === "chat.message") addFeed(ev.sub || ev.agent, ev.text, sess, ev.sub ? "ghostly" : "");
    else if (ev.type === "task.progress") addFeed(ev.agent, "⚙ " + (ev.tool || "…"), sess);
    else if (ev.type === "subagent.progress") addFeed(ev.sub, "⚙ " + (ev.tool || "…"), sess, "ghostly");
    else if (ev.type === "subagent.spawned") addFeed(ev.sub, "👻 แตกร่างรับงาน: " + String(ev.text || "").slice(0, 80), sess, "ghostly");
    else if (ev.type === "subagent.done") addFeed(ev.sub, ev.ok ? "✓ งานเสร็จ กลับเข้าร่าง" : "✗ ล้มเหลว", sess, "ghostly");
    else if (ev.type === "perm.requested") addFeed(ev.agent, "🛡 ขอใช้ " + ev.tool + " — รอ Allow/Deny (คลิกซ้าย chat head เพื่อสลับไปกด)", sess, "alert");
    else if (ev.type === "perm.approved") addFeed(ev.agent, "🛡 " + ev.tool + " — allowed ✓", sess);
    else if (ev.type === "perm.denied") addFeed(ev.agent, "🛡 " + ev.tool + " — denied ✗", sess);
    else if (ev.type === "task.completed") addFeed(ev.agent, "✓ งานเสร็จ", sess);
    else if (ev.type === "task.failed") addFeed(ev.agent, "✗ งานล้มเหลว", sess);
    else if (ev.type === "task.delegated") addFeed("main", "📋 มอบหมายงานให้ " + nameOf(ev.target), sess);
    else if (ev.type === "ceo.summon") addFeed("main", "👑 เข้ารับคำสั่งจาก CEO", sess);
    else if (ev.type === "ceo.report") addFeed("main", "📨 ส่งสรุปงานให้ CEO", sess);
    else if (ev.type === "collab.started") addFeed((ev.agents || ["main"])[0], "🤝 ประชุมเริ่ม: " + String(ev.text || ""), sess);
    else if (ev.type === "skill.created") addFeed(ev.agent, "📚 เรียนรู้สกิลใหม่: " + ev.skill, sess);
  }

  function addPermCard(ev) {
    const d = document.createElement("div");
    d.className = "perm";
    d.id = "perm-" + ev.perm;
    let input = "";
    try { input = JSON.stringify(JSON.parse(ev.input), null, 1); } catch { input = ev.input || ""; }
    d.innerHTML =
      `<b>${ev.agent}</b> requests <span class="tool">${ev.tool}</span>` +
      `<pre>${input.replace(/[<>&]/g, (c) => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;" }[c]))}</pre>` +
      `<div class="row"><button class="allow">✓ Allow</button><button class="deny">✗ Deny</button></div>`;
    d.querySelector(".allow").onclick = () => respondPerm(ev.perm, "allow");
    d.querySelector(".deny").onclick = () => respondPerm(ev.perm, "deny");
    permsEl.appendChild(d);
    setSide(true);  // a pending approval summons the Security Center
    renderBadge();
  }
  async function respondPerm(id, decision) {
    const r = await fetch("/perm/respond", {
      method: "POST", headers: { "content-type": "application/json" },
      body: JSON.stringify({ id, decision }),
    });
    if (!r.ok) {
      // Stale card (daemon restarted / request already timed out) — clean up.
      removePermCard(id);
      addChip("🛡 การ์ดนี้หมดอายุไปแล้ว (คำขอถูกปิดไปก่อนหน้า)");
    }
  }
  function removePermCard(id) {
    const el = document.getElementById("perm-" + id);
    if (el) el.remove();
    renderBadge();
  }

  // ---- daylight picker ------------------------------------------------------
  const DAY_OPTS = [
    ["auto", "🔄 AUTO — ตามเวลาเครื่อง"],
    [7.5, "🌅 เช้าตรู่"],
    [13, "☀️ กลางวัน"],
    [17.3, "🌇 เย็น"],
    [22, "🌙 กลางคืน"],
  ];
  let dayMode = "auto";
  function renderDayMenu() {
    const m = document.getElementById("dayMenu");
    m.innerHTML = "";
    for (const [val, label] of DAY_OPTS) {
      const o = document.createElement("div");
      o.className = "opt" + (String(val) === String(dayMode) ? " active" : "");
      o.textContent = label;
      o.onclick = () => {
        m.classList.remove("open");
        fetch("/ui/daylight", { method: "POST", headers: { "content-type": "application/json" },
          body: JSON.stringify({ hour: val }) });
      };
      m.appendChild(o);
    }
  }
  document.getElementById("dayBtn").onclick = (e) => {
    e.stopPropagation();
    renderDayMenu();
    document.getElementById("dayMenu").classList.toggle("open");
  };
  document.addEventListener("click", () => document.getElementById("dayMenu").classList.remove("open"));

  // ---- settings / editor / ID card -----------------------------------------
  const modal = document.getElementById("modal");
  const modalCard = document.getElementById("modalCard");
  function closeModal() { modal.classList.remove("open"); mapOpen = false; }
  modal.addEventListener("click", (e) => { if (e.target === modal) closeModal(); });
  document.getElementById("setBtn").onclick = () => openSettings("agents");

  function hdr(title) {
    return `<h3>${title}<div class="winbtn x" onclick="document.getElementById('modal').classList.remove('open')">✕</div></h3>`;
  }

  function openSettings(tab) {
    modal.classList.add("open");
    const T = (t, label) => `<div class="tab ${tab === t ? "on" : ""}" data-t="${t}">${label}</div>`;
    const tabs = `<div class="tabs">${T("agents", "AGENTS")}${T("roles", "ROLES")}${T("skills", "SKILLS")}${T("tools", "TOOLS")}${T("threads", "THREADS")}</div>`;
    let bodyHtml = "";
    if (tab === "agents") {
      bodyHtml = `<div class="switch ${SOUND ? "on" : ""}" id="sndSw">
          <div class="knob"><\/div> 🔊 Sound effects — เสียงประกอบในโลก office</div>
        <div id="alist"></div><button class="bigbtn" id="newAgent">＋ Hire a new agent</button>`;
    } else if (tab === "skills") {
      bodyHtml = `<div class="switch ${AUTOSKILLS ? "on" : ""}" id="autoSw">
          <div class="knob"></div> Auto-learn: agents distill finished work into new skills</div>
        <div id="slist"></div><button class="bigbtn" id="newSkill">＋ New skill</button>`;
    } else if (tab === "tools") {
      bodyHtml = `<div class="field"><label>🔧 BUILT-IN — เครื่องมือมาตรฐานของ Claude (ลบไม่ได้ · เปิด/ปิดรายตัวในหน้าแก้ไข agent)</label>
          <div id="tlist"></div></div>
        <div class="field"><label>🔌 MCP SERVERS — เพิ่มความสามารถใหม่ตามมาตรฐาน MCP</label>
          <div style="font-size:11px;color:var(--dim);margin-bottom:8px">
            ใส่ชื่อ + คำสั่งรัน server แล้ว assign ให้ agent ในหน้าแก้ไข เช่น<br>
            <b style="color:var(--text)">github</b> → <code>npx -y @modelcontextprotocol/server-github</code><br>
            <b style="color:var(--text)">playwright</b> → <code>npx -y @playwright/mcp</code> (คุมเบราว์เซอร์)<br>
            หาเพิ่มได้จาก github.com/modelcontextprotocol/servers</div>
          <div id="mlist"></div>
          <div class="assistrow" style="margin-top:8px">

  // ---- sessions (threads) ---------------------------------------------------
  const SESS = {};  // target -> "new" | session key | undefined (= latest)
  const CUR = {};   // target -> resolved current thread key (for filtering)
  let groupView = null;  // meeting key while reading/watching a group session
  function setThreadLabel(t) { document.getElementById("threadName").textContent = t; }

  // Row of mini participant faces — hover a face for name + role.
  function facesStrip(ids, size = 18) {
    const wrap = document.createElement("span");
    wrap.style.display = "inline-flex";
    wrap.style.gap = "3px";
    wrap.style.verticalAlign = "middle";
    for (const id of ids || []) {
      const f = document.createElement("span");
      f.className = "px";
      f.style.display = "inline-block";
      f.style.width = size + "px";
      f.style.height = size + "px";
      f.style.borderRadius = "5px";
      f.style.backgroundColor = "#1c2740";
      f.style.outline = "1px solid rgba(255,255,255,0.15)";
      const k = size / 36;
      f.style.backgroundImage = `url(/char/npc${npcOf(id)}.png)`;
      f.style.backgroundSize = `${256 * k}px ${512 * k}px`;
      f.style.backgroundPosition = `${-14 * k}px ${-14 * k}px`;
      f.title = `${nameOf(id)} — ${roleOf(id)}`;
      wrap.appendChild(f);
    }
    return wrap;
  }

  // Meetings (@group) and sub-agent jobs (@sub) are bucket sessions: open
  // one read-only in the chat pane; live messages keep streaming in.
  async function openGroupLog(key, title, bucket = "@group", faceId = null) {
    groupView = key;
    setThreadLabel((bucket === "@sub" ? "👻 " : "🗣 ") + title);
    document.getElementById("inp").placeholder = bucket === "@sub"
      ? "งานของ sub-agent (อ่านอย่างเดียว) — คลิก agent ใน rail เพื่อกลับไปคุย"
      : "บันทึกการประชุม (อ่านอย่างเดียว) — คลิก agent ใน rail เพื่อกลับไปคุย";
    log.innerHTML = "";
    try {
      const r = await fetch(`/sessions/log?agent=${encodeURIComponent(bucket)}&key=${encodeURIComponent(key)}`)
        .then((x) => x.json());
      for (const m of r.log || []) {
        if (m.who === "tool") addToolRow(m.text);
        else if (m.who === "you") addMsg("you", null, m.text);
        else addMsg("agent", faceId || m.who, m.text);
      }
    } catch {}
  }

  // CEO orders run as the Director's sessions (👑-prefixed) — the CEO pane
  // reads and resumes those threads, so "what did my order produce" is one
  // click away.
  function sessAgent() { return target === "ceo" ? "main" : target; }

  // The chat pane shows ONE conversation: the current thread of the current
  // agent — switching either reloads its history from the daemon.
  async function loadThreadLog(key) {
    log.innerHTML = "";
    if (!key) return;
    try {
      const r = await fetch(`/sessions/log?agent=${encodeURIComponent(sessAgent())}&key=${encodeURIComponent(key)}`)
        .then((x) => x.json());
      for (const m of r.log || []) {
        if (m.who === "tool") addToolRow(m.text);
        else addMsg(m.who === "you" ? "you" : "agent", m.who === "you" ? null : sessAgent(), m.text);
      }
    } catch {}
  }

  // force=true (agent click) always re-renders the pane — the log view is
  // shared, so "same thread as before" never means "still on screen".
  async function refreshThreadBar(force = false) {
    if (SESS[target] === "new") {
      CUR[target] = null;
      log.innerHTML = "";
      return setThreadLabel("🆕 thread ใหม่ — เริ่มเมื่อส่งข้อความแรก");
    }
    try {
      const r = await fetch(`/sessions?agent=${encodeURIComponent(sessAgent())}`).then((x) => x.json());
      const list = r.sessions || [];
      let cur = SESS[target] ? list.find((s) => s.key === SESS[target]) : null;
      if (!cur) cur = list[0];
      setThreadLabel(cur ? cur.title : "ยังไม่มี — จะสร้างให้เองเมื่อคุยครั้งแรก");
      const key = cur ? cur.key : null;
      if (CUR[target] !== key || force) {
        CUR[target] = key;
        await loadThreadLog(key);
      }
    } catch { setThreadLabel("ล่าสุด"); }
  }

  document.getElementById("sessBtn").onclick = async (e) => {
    e.stopPropagation();
    const m = document.getElementById("sessMenu");
    if (m.classList.contains("open")) return m.classList.remove("open");
    const r = await fetch(`/sessions?agent=${encodeURIComponent(sessAgent())}`).then((x) => x.json());
    const list = r.sessions || [];
    // ไม่ได้เลือกอะไร = คุยต่อ thread ล่าสุดเสมอ
    const activeKey = SESS[target] || (list[0] && list[0].key);
    m.innerHTML = "";
    const mk = (label, sub, key, active, onpick) => {
      const o = document.createElement("div");
      o.className = "opt" + (active ? " active" : "");
      o.innerHTML = label + (sub ? `<small>${sub}</small>` : "");
      o.onclick = () => { onpick(); m.classList.remove("open"); refreshThreadBar(); };
      m.appendChild(o);
    };
    mk("🆕 เริ่ม thread ใหม่", "ความจำใหม่ ไม่ต่อจากของเดิม", "new",
      SESS[target] === "new",
      () => { groupView = null; SESS[target] = "new"; addChip(`🧵 เริ่ม thread ใหม่กับ <b>${nameOf(target)}</b>`); });
    for (const s of list)
      mk(`🧵 ${s.title || s.key}`, new Date(s.ts).toLocaleString(), s.key,
        !groupView && SESS[target] !== "new" && s.key === activeKey,
        () => { groupView = null; CUR[target] = null; SESS[target] = s.key;
          addChip(`🧵 สลับไป thread: <b>${(s.title || s.key).slice(0, 40)}</b>`); });
    if (!list.length && SESS[target] !== "new")
      mk("(ยังไม่มี thread เก่า — คุยครั้งแรกจะสร้างให้เอง)", "", undefined, false, () => {});
    // 🗣 group sessions: every meeting, readable any time
    try {
      const g = await fetch(`/sessions?agent=${encodeURIComponent("@group")}`).then((x) => x.json());
      const meets = g.sessions || [];
      if (meets.length) {
        const hd = document.createElement("div");
        hd.className = "opt";
        hd.style.cursor = "default";
        hd.style.color = "var(--dim)";
        hd.style.fontSize = "10.5px";
        hd.textContent = "—  🗣 การประชุม  —";
        m.appendChild(hd);
        for (const s of meets) {
          const o = document.createElement("div");
          o.className = "opt" + (groupView === s.key ? " active" : "");
          o.style.display = "block";
          const top = document.createElement("div");
          top.style.display = "flex";
          top.style.alignItems = "center";
          top.style.gap = "7px";
          top.appendChild(facesStrip(s.agents, 20));
          top.appendChild(document.createTextNode(`🗣 ${s.title || s.key}`));
          const sub = document.createElement("small");
          sub.style.display = "block";
          sub.style.color = "var(--dim)";
          sub.style.fontSize = "10px";
          sub.textContent = new Date(s.ts).toLocaleString();
          o.append(top, sub);
          o.onclick = () => { m.classList.remove("open"); openGroupLog(s.key, s.title || s.key); };
          m.appendChild(o);
        }
      }
    } catch {}
    // 👻 sub-agent sessions: every split job, readable forever
    try {
      const u = await fetch(`/sessions?agent=${encodeURIComponent("@sub")}`).then((x) => x.json());
      const subs = (u.sessions || []).slice(0, 8);
      if (subs.length) {
        const hd = document.createElement("div");
        hd.className = "opt";
        hd.style.cursor = "default";
        hd.style.color = "var(--dim)";
        hd.style.fontSize = "10.5px";
        hd.textContent = "—  👻 SUB AGENTS  —";
        m.appendChild(hd);
        for (const s of subs) {
          const o = document.createElement("div");
          o.className = "opt" + (groupView === s.key ? " active" : "");
          o.style.display = "block";
          const top = document.createElement("div");
          top.style.display = "flex";
          top.style.alignItems = "center";
          top.style.gap = "7px";
          top.appendChild(facesStrip([s.parent], 20));
          top.appendChild(document.createTextNode(`👻 ${s.title || s.key}`));
          const sub = document.createElement("small");
          sub.style.display = "block";
          sub.style.color = "var(--dim)";
          sub.style.fontSize = "10px";
          sub.textContent = `ร่างแยกของ ${nameOf(s.parent)} · ` +
            (s.ok === false ? "✗ ล้มเหลว" : s.ok ? "✓ สำเร็จ" : "⏳ กำลังทำ") +
            ` · ${new Date(s.ts).toLocaleString()}`;
          o.append(top, sub);
          o.onclick = () => { m.classList.remove("open");
            openGroupLog(s.key, s.title || s.key, "@sub", s.parent); };
          m.appendChild(o);
        }
      }
    } catch {}
    m.classList.add("open");
  };
  document.addEventListener("click", () => document.getElementById("sessMenu").classList.remove("open"));

  // ---- discussion launcher ----------------------------------------------------
  document.getElementById("discussBtn").onclick = () => openDiscuss();
  function openDiscuss() {
    modal.classList.add("open");
    const picked = new Set();
    modalCard.innerHTML = hdr("🗣 AGENT DISCUSSION") +
      `<div class="field"><label>TOPIC — หัวข้อให้ทีมถกกัน</label>
         <input id="dTopic" placeholder='เช่น "วางแผนฟีเจอร์ onboarding ใหม่"'></div>
       <div class="field"><label>PARTICIPANTS (เลือก 2-4 ตัว)</label>
         <div class="checks" id="dWho"></div></div>
       <div class="field"><label>ROUNDS</label>
         <select id="dRounds"><option value="1">1 — เร็ว</option>
         <option value="2" selected>2 — มาตรฐาน</option><option value="3">3 — ลึก</option></select></div>
       <div class="btnrow">
         <button id="dCancel">Cancel</button>
         <button class="primary" id="dGo">🗣 Start discussion</button>
       </div>`;
    const box = modalCard.querySelector("#dWho");
    // ทีมทั้งหมดจาก registry (CEO คือคุณ — ไม่เข้าร่วมวงประชุมของ AI)
    for (const id of Object.keys(ROSTER).filter((x) => x !== "ceo")) {
      const c = document.createElement("div");
      c.className = "chk";
      const f = document.createElement("div");
      f.className = "mini px";
      const k = 18 / 36;
      f.style.backgroundImage = `url(/char/npc${npcOf(id)}.png)`;
      f.style.backgroundSize = `${256 * k}px ${512 * k}px`;
      f.style.backgroundPosition = `${-14 * k}px ${-14 * k}px`;
      c.appendChild(f);
      c.appendChild(document.createTextNode(`${nameOf(id)} · ${roleOf(id)}`));
      c.onclick = () => { picked.has(id) ? picked.delete(id) : picked.add(id); c.classList.toggle("on"); };
      box.appendChild(c);
    }
    modalCard.querySelector("#dCancel").onclick = closeModal;
    modalCard.querySelector("#dGo").onclick = async () => {
      const topic = modalCard.querySelector("#dTopic").value.trim();
      if (!topic || picked.size < 2) return;
      await api("/discuss", { agents: [...picked], topic,
        rounds: Number(modalCard.querySelector("#dRounds").value) });
      closeModal();
      addChip(`🗣 meeting started: <b>${topic.slice(0, 50)}</b>`);
    };
  }

  // ---- top-down map ---------------------------------------------------------
  // World→map transform; must match the ortho render in office_floor.gd.
  const MAP = { x0: -11.29, w: 28.57, z0: -11.0, d: 25.0 };
  let mapOpen = false, lastPos = [];
  document.getElementById("mapBtn").onclick = () => openMap();

  function openMap() {
    modal.classList.add("open");
    mapOpen = true;
    modalCard.innerHTML = hdr("🗺 OFFICE MAP — click an agent to chat") +
      `<div id="mapWrap"><img id="mapImg" src="/map/bg?t=${Date.now()}"
          onerror="this.style.minHeight='320px'">
        <div id="mapIcons" style="position:absolute;inset:0"></div></div>`;
    renderMapIcons();
  }

  function renderMapIcons() {
    if (!mapOpen) return;
    const box = document.getElementById("mapIcons");
    if (!box) return;
    box.innerHTML = "";
    for (const p of lastPos) {
      // Ghost clones float on the map too: parent's face, half-there.
      const isGhost = String(p.id).includes("#");
      const baseId = String(p.id).split("#")[0];
      const ic = document.createElement("div");
      ic.className = "mapicon px";
      ic.style.left = ((p.x - MAP.x0) / MAP.w * 100) + "%";
      ic.style.top = ((p.z - MAP.z0) / MAP.d * 100) + "%";
      ic.style.outlineColor = isGhost ? "#a5b8ff" : (DOTS[p.state] || "#4ade80");
      if (isGhost) ic.style.opacity = "0.55";
      const k = 26 / 36;
      ic.style.backgroundImage = `url(/char/npc${npcOf(baseId)}.png)`;
      ic.style.backgroundSize = `${256 * k}px ${512 * k}px`;
      ic.style.backgroundPosition = `${-14 * k}px ${-14 * k}px`;
      const label = isGhost ? `👻 ${nameOf(baseId)}` : nameOf(p.id);
      ic.innerHTML = `<div class="tag">${label}</div>`;
      ic.title = `${label} — ${p.state}`;
      if (!isGhost) ic.onclick = () => { closeModal(); setTarget(p.id); };
      box.appendChild(ic);
    }
  }

  async function api(url, body) {
    const r = await fetch(url, {
      method: "POST", headers: { "content-type": "application/json" },
      body: JSON.stringify(body),
    });
    try { return await r.json(); } catch { return {}; }
  }

  // Sub-agent (ghost) events: parent's face, spectral naming — never a rail
  // seat, never a roster entry. Live view appends when watching that session.
  function routeSub(ev, subId) {
    const pid = String(ev.agent || subId).split("#")[0];
    const tag = subId.includes("#") ? subId.split("#")[1].toUpperCase() : "SUB";
    const gname = `${nameOf(pid)} · ${tag}`;
    if (ev.replay) return;
    if (ev.type === "subagent.spawned")
      addLog(`👻 <b>${gname}</b> แตกร่างขึ้น Ghost Deck — ${String(ev.text || "").slice(0, 60)}`);
    else if (ev.type === "subagent.done")
      addLog(`👻 <b>${gname}</b> ${ev.ok ? "งานเสร็จ ✓ กลับเข้าร่าง" : "ล้มเหลว ✗ กลับเข้าร่าง"}`);
    else if (ev.type === "subagent.progress") {
      addLog(`⚙ <b>${ev.tool || "…"}</b> — 👻 ${gname}`);
      if (groupView && ev.session === groupView) addToolRow(ev.tool || "…");
    }
    else if (ev.type === "chat.message") {
      if (groupView && ev.session === groupView) addMsg("agent", pid, ev.text);
    }
    else if (ev.type === "perm.requested") addPermCard({ ...ev, agent: gname });
    else if (ev.type === "perm.approved" || ev.type === "perm.denied") {
      removePermCard(ev.perm);
      addLog(`🛡 ${ev.tool} — <b>${ev.type === "perm.approved" ? "allowed" : "denied"}</b> (👻 ${gname})`);
    }
  }

  // ---- event routing --------------------------------------------------------
  function route(ev) {
    if (ev.type === "world.pos") {
      lastPos = ev.agents || [];
      if (mapOpen) renderMapIcons();
      return;
    }
    if (ev.type === "ui.mapbg") {
      const im = document.getElementById("mapImg");
      if (im) im.src = "/map/bg?t=" + Date.now();
      return;
    }
    if (ev.type === "roster.sync") {
      ROSTER = ev.agents || {};
      REGROLES = ev.roles || [];
      REGSKILLS = ev.skills || {};
      REGTOOLS = ev.tools || [];
      BUILTIN_DESC = ev.builtinTools || {};
      REGMCP = ev.mcp || {};
      AUTOSKILLS = ev.autoSkills !== false;
      SOUND = ev.sound !== false;
      for (const id of Object.keys(ROSTER)) ensureAgent(id);
      renderRail();
      setTarget(target);   // refresh name/role if the target was edited
      return;
    }
    if (ev.type === "roster.removed") {
      delete agents[ev.agent];
      delete ROSTER[ev.agent];
      if (target === ev.agent) setTarget("main");
      renderRail();
      return;
    }
    if (ev.type === "ui.daylight") { dayMode = ev.hour; return; }
    if (String(ev.type).startsWith("ui.")) return;  // debug beacons aren't agents
    const key = ev.task || ev.agent;
    if (ev.type === "theater.started") {
      document.getElementById("theater").style.display = "inline";
      addLog(`⏪ <b>Replay Theater</b> — ${ev.events} events at ${ev.speed}×`);
      return;
    }
    if (ev.type === "theater.ended") {
      document.getElementById("theater").style.display = "none";
      addLog("⏪ replay finished");
      return;
    }
    if (ev.theater) {
      if (ev.type === "chat.message") addLog(`⏪ 💬 <b>${ev.agent}</b>: ${String(ev.text).slice(0, 60)}`);
      else if (ev.type === "task.progress") addLog(`⏪ ⚙ ${ev.tool || ""} — ${ev.agent}`);
      return;
    }
    feedRoute(ev);  // the 📡 feed mirrors everything glanceable

    // Ghost traffic peels off before anything can mint a rail seat for it.
    const subId = ev.sub || (ev.agent && String(ev.agent).includes("#") ? ev.agent : null);
    if (subId) return routeSub(ev, subId);
    if (ev.type === "subagent.split") {
      if (!ev.replay) addLog(`👻 <b>${nameOf(ev.agent)}</b> แตกร่าง ${ev.count} sub-agents → Ghost Deck`);
      return;
    }
    if (ev.agent) ensureAgent(ev.agent);
    if (ev.agents) ev.agents.forEach((a) => ensureAgent(a, "meeting"));

    if (ev.type === "chat.message") {
      // The pane is per-conversation: bubble only for the current agent's
      // current thread (or the meeting being watched live); history replays
      // come from /sessions/log instead.
      if (!ev.replay && groupView && ev.session === groupView)
        addMsg("agent", ev.agent, ev.text);
      else if (!ev.replay && !groupView &&
          (ev.agent === target || (target === "ceo" && ev.agent === "main")) &&
          (!ev.session || !CUR[target] || ev.session === CUR[target]))
        addMsg("agent", ev.agent, ev.text);
    }
    else if (ev.type === "task.progress") {
      if (!ev.replay) {
        addLog(`⚙ <b>${ev.tool || "…"}</b> — ${nameOf(ev.agent)}`);
        // Inline marker inside the conversation it belongs to.
        if (!groupView &&
            (ev.agent === target || (target === "ceo" && ev.agent === "main")) &&
            ev.session && ev.session === CUR[target])
          addToolRow(ev.tool || "…");
      }
      if (missions[key]) { missions[key].tool = ev.tool; renderMissions(); }
      ensureAgent(ev.agent, "working");
    }
    else if (ev.type === "task.started") {
      missions[key] = { agent: ev.agent, state: "running" }; renderMissions();
      ensureAgent(ev.agent, "working");
    }
    else if (ev.type === "task.completed") {
      if (missions[key]) { missions[key].state = "done"; renderMissions(); }
      ensureAgent(ev.agent, "idle");
      if (ev.agent === target && !ev.replay) refreshThreadBar();  // fresh thread gets its title
    }
    else if (ev.type === "task.failed") {
      if (missions[key]) { missions[key].state = "failed"; renderMissions(); }
      ensureAgent(ev.agent, "idle");
    }
    else if (ev.type === "perm.requested") {
      if (missions[key]) { missions[key].state = "blocked"; renderMissions(); }
      ensureAgent(ev.agent, "blocked");
      if (!ev.replay) addPermCard(ev);
    }
    else if (ev.type === "perm.approved" || ev.type === "perm.denied") {
      removePermCard(ev.perm);
      if (missions[key]) { missions[key].state = "running"; renderMissions(); }
      ensureAgent(ev.agent, "working");
      if (!ev.replay) addLog(`🛡 ${ev.tool} — <b>${ev.type === "perm.approved" ? "allowed" : "denied"}</b> (${nameOf(ev.agent)})`);
    }
    else if (ev.type === "ceo.summon") {
      // Direct feedback in the CEO pane (you just gave the order) — log otherwise.
      if (!ev.replay) {
        addLog(`👑 CEO เรียก <b>${nameOf("main")}</b> เข้ารับคำสั่ง`);
        if (target === "ceo") addChip(`👑 <b>${nameOf("main")}</b> กำลังเดินมารับคำสั่ง…`);
      }
    }
    else if (ev.type === "task.delegated") {
      if (!ev.replay) {
        addLog(`📋 <b>${nameOf("main")}</b> มอบหมายงานให้ <b>${nameOf(ev.target)}</b>`);
        if (target === "ceo") addChip(`📋 มอบหมายงานให้ <b>${nameOf(ev.target)}</b>`);
      }
    }
    else if (ev.type === "ceo.report") {
      if (!ev.replay) {
        addLog(`📨 <b>${nameOf("main")}</b> ส่งสรุปงานให้ CEO`);
        if (target === "ceo") addChip(`📨 <b>${nameOf("main")}</b> เดินมาส่งสรุปงานแล้ว ↑`);
      }
    }
    else if (ev.type === "collab.started") {
      if (!ev.replay) addLog(`🤝 ประชุมเริ่ม — ${(ev.agents || []).map(nameOf).join(", ")}`);
    }
    else if (ev.type === "collab.ended") {
      if (!ev.replay) addLog(`🤝 ประชุมจบ`);
    }
    else if (ev.type === "skill.created") {
      if (!ev.replay) addLog(`📚 <b>${nameOf(ev.agent)}</b> learned a new skill: <b>${ev.skill}</b>`);
    }
    else if (ev.type === "agent.online") ensureAgent(ev.agent, "idle");
    else if (ev.type === "agent.offline") ensureAgent(ev.agent, "offline");
  }

  function connect() {
    const ws = new WebSocket(`ws://${location.host}/ws`);
    ws.onopen = () => document.getElementById("conn").classList.add("on");
    ws.onclose = () => {
      document.getElementById("conn").classList.remove("on");
      setTimeout(connect, 2000);
    };
    ws.onmessage = (e) => route(JSON.parse(e.data));
  }
  // boot (after all declarations — const TDZ bites otherwise)
  ensureAgent("main");
  setTarget("main");
  connect();

  // ---- send ---------------------------------------------------------------
  async function send() {
    const inp = document.getElementById("inp");
    const prompt = inp.value.trim();
    if (!prompt) return;
    if (groupView) {
      addChip("📖 กำลังดูบันทึกย้อนหลัง (อ่านอย่างเดียว) — คลิก agent ใน rail เพื่อกลับไปคุย");
      return;
    }
    inp.value = "";
    addMsg("you", null, prompt);
    const session = SESS[target];
    if (session === "new") SESS[target] = undefined;  // next sends continue it
    await fetch("/chat", {
      method: "POST", headers: { "content-type": "application/json" },
      body: JSON.stringify({ agent: target, prompt, session }),
    });
    refreshThreadBar();  // a fresh thread exists server-side immediately
  }
  document.getElementById("send").onclick = send;
  document.getElementById("inp").addEventListener("keydown", (e) => { if (e.key === "Enter") send(); });
  document.getElementById("replayBtn").onclick = async () => {
    let r = {};
    try {
      r = await fetch("/replay", {
        method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify({ minutes: 15, speed: 10 }),
      }).then((x) => x.json());
    } catch {}
    addChip(r.replaying
      ? "⏪ กำลังฉายเหตุการณ์ 15 นาทีย้อนหลัง — โลกจะกลายเป็นโทนซีเปียจนจบเรื่อง"
      : "⏪ มี replay ฉายอยู่แล้ว — รอให้จบก่อนนะครับ");
  };

  // Top-bar popups (menus, modals, the map…) live where the sidebar slides
  // in — opening any of them tucks the panel away first.
  for (const bid of ["replayBtn", "discussBtn", "mapBtn", "dayBtn", "setBtn", "sessBtn"]) {
    const el = document.getElementById(bid);
    if (el) el.addEventListener("click", () => setSide(false), true);
  }

  // ---- custom window chrome (only inside the native shell) ----------------
  // NB: wry injects a global named `ipc` — never shadow it with const/let!
  const shellPost = window.ipc && window.ipc.postMessage
    ? (m) => window.ipc.postMessage(m) : null;
  if (shellPost) {
    document.getElementById("titlebar").addEventListener("mousedown", (e) => {
      if (e.button === 0 && !e.target.closest("button") && !e.target.closest(".winbtn"))
        shellPost("drag-overlay");
    });
    document.getElementById("miniBtn").onclick = () => shellPost("mini");
    document.getElementById("hideBtn").onclick = () => shellPost("hide");
  } else {
    // plain browser: the OS window has its own chrome
    document.getElementById("miniBtn").style.display = "none";
    document.getElementById("hideBtn").style.display = "none";
    document.body.style.borderRadius = "0";
    document.body.style.border = "none";
  }
</script>
</html>
