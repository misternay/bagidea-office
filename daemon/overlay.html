<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BagIdea Office</title>
<style>
  :root {
    --glass: rgba(16, 22, 34, 0.78);
    --line: rgba(110, 180, 255, 0.25);
    --accent: #5ec8ff;
    --text: #dce6f2;
    --dim: #8294ab;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font: 14px/1.45 "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(1200px 700px at 70% -10%, #16263e 0%, #0a111d 60%, #070b13 100%);
    color: var(--text); height: 100vh; display: flex; flex-direction: column;
  }
  header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; border-bottom: 1px solid var(--line);
    background: var(--glass); backdrop-filter: blur(12px);
    letter-spacing: 2px; font-weight: 600; font-size: 13px;
  }
  header .logo { color: var(--accent); }
  #conn { width: 8px; height: 8px; border-radius: 50%; background: #ff5448; }
  #conn.on { background: #4ade80; box-shadow: 0 0 8px #4ade8088; }
  header .sub { color: var(--dim); font-weight: 400; letter-spacing: 0; margin-left: auto; font-size: 12px; }

  main { flex: 1; display: flex; min-height: 0; }
  #chat { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #log { flex: 1; overflow-y: auto; padding: 18px 20px; display: flex; flex-direction: column; gap: 10px; }

  .msg { max-width: 78%; padding: 9px 13px; border-radius: 12px; white-space: pre-wrap; word-wrap: break-word; }
  .msg.you  { align-self: flex-end; background: rgba(94, 200, 255, 0.13); border: 1px solid var(--line); border-bottom-right-radius: 4px; }
  .msg.agent { align-self: flex-start; background: var(--glass); border: 1px solid rgba(255,255,255,0.07); border-bottom-left-radius: 4px; }
  .msg .who { font-size: 11px; color: var(--accent); margin-bottom: 3px; letter-spacing: 1px; }
  .chip {
    align-self: flex-start; font-size: 11.5px; color: var(--dim);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 3px 10px;
    background: rgba(255,255,255,0.03);
  }
  .chip b { color: #ffd28a; font-weight: 600; }

  aside {
    width: 250px; border-left: 1px solid var(--line); background: var(--glass);
    backdrop-filter: blur(12px); padding: 14px; overflow-y: auto;
  }
  aside h2 { font-size: 11px; letter-spacing: 2px; color: var(--dim); margin-bottom: 10px; }
  .mission {
    border: 1px solid var(--line); border-left: 3px solid var(--accent);
    border-radius: 8px; padding: 8px 10px; margin-bottom: 8px; font-size: 12.5px;
    background: rgba(255,255,255,0.03);
  }
  .mission .id { color: var(--dim); font-size: 11px; }
  .mission.running { border-left-color: #5ec8ff; }
  .mission.blocked { border-left-color: #ffb054; }
  .mission.done    { border-left-color: #4ade80; opacity: 0.7; }
  .mission.failed  { border-left-color: #ff5448; }

  .perm {
    border: 1px solid #ffb054aa; border-radius: 10px; padding: 10px;
    margin-bottom: 10px; background: rgba(255, 176, 84, 0.08); font-size: 12.5px;
  }
  .perm .tool { color: #ffd28a; font-weight: 700; }
  .perm pre {
    font-size: 11px; color: var(--dim); white-space: pre-wrap; word-break: break-all;
    margin: 6px 0; max-height: 90px; overflow-y: auto;
  }
  .perm .row { display: flex; gap: 6px; }
  .perm button { flex: 1; padding: 6px; font-size: 12.5px; }
  .perm .allow { color: #4ade80; border-color: #4ade8055; }
  .perm .deny  { color: #ff5448; border-color: #ff544855; }

  footer {
    display: flex; gap: 8px; padding: 12px 16px;
    border-top: 1px solid var(--line); background: var(--glass); backdrop-filter: blur(12px);
  }
  select, input, button {
    font: inherit; color: var(--text); background: rgba(255,255,255,0.05);
    border: 1px solid var(--line); border-radius: 9px; padding: 9px 12px; outline: none;
  }
  input { flex: 1; }
  input:focus { border-color: var(--accent); }
  button { cursor: pointer; color: var(--accent); }
  button:hover { background: rgba(94, 200, 255, 0.15); }
</style>

<header>
  <span class="logo">◤ BAGIDEA</span> AI AGENTS OFFICE
  <span id="conn"></span>
  <span id="theater" style="display:none;color:#ff5448;font-weight:700">⏪ REPLAY</span>
  <button id="replayBtn" style="margin-left:auto;font-size:12px;padding:4px 10px">⏪ Replay 15m</button>
  <span class="sub" style="margin-left:8px">Layer 2 — overlay PoC</span>
</header>
<main>
  <div id="chat"><div id="log"></div></div>
  <aside>
    <h2>SECURITY CENTER</h2>
    <div id="perms"></div>
    <h2>MISSION CONTROL</h2>
    <div id="missions"></div>
  </aside>
</main>
<footer>
  <select id="agent">
    <option value="main">main</option>
    <option value="rin">rin</option>
    <option value="dev">dev</option>
  </select>
  <input id="inp" placeholder="Message the office… (Enter to send)" autofocus>
  <button id="send">➤</button>
</footer>

<script>
  const log = document.getElementById("log");
  const missionsEl = document.getElementById("missions");
  const missions = {};

  function addMsg(cls, who, text) {
    const d = document.createElement("div");
    d.className = "msg " + cls;
    if (who) {
      const w = document.createElement("div");
      w.className = "who"; w.textContent = who.toUpperCase();
      d.appendChild(w);
    }
    d.appendChild(document.createTextNode(text));
    log.appendChild(d);
    log.scrollTop = log.scrollHeight;
  }
  function addChip(html) {
    const d = document.createElement("div");
    d.className = "chip"; d.innerHTML = html;
    log.appendChild(d);
    log.scrollTop = log.scrollHeight;
  }

  function renderMissions() {
    missionsEl.innerHTML = "";
    for (const [id, m] of Object.entries(missions)) {
      const d = document.createElement("div");
      d.className = "mission " + m.state;
      d.innerHTML = `<b>${m.agent}</b> · ${m.state}` +
        (m.tool ? ` · <i>${m.tool}</i>` : "") +
        `<div class="id">${id}</div>`;
      missionsEl.appendChild(d);
    }
  }

  const permsEl = document.getElementById("perms");

  function addPermCard(ev) {
    const d = document.createElement("div");
    d.className = "perm";
    d.id = "perm-" + ev.perm;
    let input = "";
    try { input = JSON.stringify(JSON.parse(ev.input), null, 1); } catch { input = ev.input || ""; }
    d.innerHTML =
      `<b>${ev.agent}</b> requests <span class="tool">${ev.tool}</span>` +
      `<pre>${input.replace(/[<>&]/g, (c) => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;" }[c]))}</pre>` +
      `<div class="row"><button class="allow">✓ Allow</button><button class="deny">✗ Deny</button></div>`;
    d.querySelector(".allow").onclick = () => respondPerm(ev.perm, "allow");
    d.querySelector(".deny").onclick = () => respondPerm(ev.perm, "deny");
    permsEl.appendChild(d);
  }
  async function respondPerm(id, decision) {
    await fetch("/perm/respond", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ id, decision }),
    });
  }
  function removePermCard(id) {
    const el = document.getElementById("perm-" + id);
    if (el) el.remove();
  }

  function route(ev) {
    const key = ev.task || ev.agent;
    if (ev.type === "theater.started") {
      document.getElementById("theater").style.display = "inline";
      addChip(`⏪ <b>Replay Theater</b> — re-enacting ${ev.events} events at ${ev.speed}×`);
      return;
    }
    if (ev.type === "theater.ended") {
      document.getElementById("theater").style.display = "none";
      addChip("⏪ replay finished");
      return;
    }
    if (ev.theater) {
      // Cinema feed: show what's being re-enacted, never touch live state.
      if (ev.type === "chat.message") addChip(`⏪ 💬 <b>${ev.agent}</b>: ${String(ev.text).slice(0, 60)}`);
      else if (ev.type === "task.progress") addChip(`⏪ ⚙ ${ev.tool || ""} — ${ev.agent}`);
      return;
    }
    if (ev.type === "chat.message") addMsg("agent", ev.agent, ev.text);
    else if (ev.type === "task.progress") {
      if (!ev.replay) addChip(`⚙ <b>${ev.tool || "…"}</b> — ${ev.agent}`);
      if (missions[key]) { missions[key].tool = ev.tool; renderMissions(); }
    }
    else if (ev.type === "task.started") {
      missions[key] = { agent: ev.agent, state: "running" }; renderMissions();
    }
    else if (ev.type === "task.completed") { if (missions[key]) { missions[key].state = "done"; renderMissions(); } }
    else if (ev.type === "task.failed") { if (missions[key]) { missions[key].state = "failed"; renderMissions(); } }
    else if (ev.type === "perm.requested") {
      if (missions[key]) { missions[key].state = "blocked"; renderMissions(); }
      if (!ev.replay) addPermCard(ev);  // stale approvals never resurface
    }
    else if (ev.type === "perm.approved" || ev.type === "perm.denied") {
      removePermCard(ev.perm);
      if (missions[key]) { missions[key].state = "running"; renderMissions(); }
      if (!ev.replay) addChip(`🛡 ${ev.tool} — <b>${ev.type === "perm.approved" ? "allowed" : "denied"}</b>`);
    }
  }

  function connect() {
    const ws = new WebSocket(`ws://${location.host}/ws`);
    ws.onopen = () => document.getElementById("conn").classList.add("on");
    ws.onclose = () => {
      document.getElementById("conn").classList.remove("on");
      setTimeout(connect, 2000);
    };
    ws.onmessage = (e) => route(JSON.parse(e.data));
  }
  connect();

  async function send() {
    const inp = document.getElementById("inp");
    const agent = document.getElementById("agent").value;
    const prompt = inp.value.trim();
    if (!prompt) return;
    inp.value = "";
    addMsg("you", null, prompt);
    await fetch("/chat", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ agent, prompt }),
    });
  }
  document.getElementById("send").onclick = send;
  document.getElementById("inp").addEventListener("keydown", (e) => {
    if (e.key === "Enter") send();
  });
  document.getElementById("replayBtn").onclick = () =>
    fetch("/replay", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ minutes: 15, speed: 10 }),
    });
</script>
</html>
